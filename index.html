    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&family=Noto+Kufi+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Montserrat', 'sans-serif'],
              arabic: ['Noto Kufi Arabic', 'sans-serif'],
            },
            colors: {
              brand: {
                dark: '#0a0a0a',
                gray: '#1a1a1a',
                accent: '#ffffff',
                gold: '#fbbf24', 
              }
            }
          }
        }
      }

    <style>
      /* Custom scrollbar for a premium feel */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0a0a0a; 
      }
      ::-webkit-scrollbar-thumb {
        background: #333; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #555; 
      }

      /* Print Optimization for PDF Generation */
      @media print {
        @page {
          size: A4;
          margin: 0mm;
        }
        
        /* Hide everything by default */
        body * {
          visibility: hidden;
        }

        /* Only show the printable document */
        #printable-document, #printable-document * {
          visibility: visible;
        }

        #printable-document {
          position: absolute;
          left: 0;
          top: 0;
          width: 100%;
          margin: 0;
          padding: 20px !important; /* Add some padding for the PDF */
          background-color: #0a0a0a !important;
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
          color: white !important;
          box-shadow: none !important;
          border: none !important;
        }
        
        html, body {
          background-color: #0a0a0a !important;
          height: 100%;
          overflow: visible !important;
        }
        
        /* Force background colors on containers inside the doc */
        .bg-brand-dark, .bg-\[\#050505\], .bg-\[\#0a0a0a\] {
          background-color: #0a0a0a !important;
        }

        .no-print {
          display: none !important;
        }
        
        /* Ensure text contrast */
        * {
          text-shadow: none !important;
        }
      }
      
      /* Editable Highlight */
      .editable-highlight {
        border-bottom: 1px dashed rgba(251, 191, 36, 0.5);
        background-color: rgba(251, 191, 36, 0.05);
        border-radius: 2px;
        padding: 0 2px;
        transition: all 0.2s;
      }
      .editable-highlight:focus {
        outline: none;
        background-color: rgba(251, 191, 36, 0.1);
        border-bottom: 1px solid rgba(251, 191, 36, 1);
      }
    </style>
